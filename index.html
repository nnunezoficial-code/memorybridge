<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MemoryBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0f172a;color:white;font-family:sans-serif;padding:40px;">

<h2>Login</h2>

<input id="emailInput" placeholder="tu correo" style="padding:10px;width:250px;">
<button onclick="login()">Iniciar sesión</button>
<button onclick="logout()">Cerrar sesión</button>

<p id="status">No logueado</p>

<hr>

<button onclick="generate()">Crear perfil</button>

<script>
const supabase = window.supabase.createClient(
  "https://hthovlyivohvsjasaqify.supabase.co",
  "sb_publishable_WYTHqLQMRe9V3gyBd7nsxA_24FFiuS7"
);

async function login() {
  const email = document.getElementById("emailInput").value;

  const { error } = await supabase.auth.signInWithOtp({
    email: email,
    options: {
      emailRedirectTo: window.location.origin
    }
  });

  if (error) {
    alert(error.message);
  } else {
    alert("revisa tu correo");
  }
}

async function logout() {
  await supabase.auth.signOut();
  checkUser();
}

async function checkUser() {
  const { data } = await supabase.auth.getUser();

  if (data.user) {
    document.getElementById("status").innerText = "Logueado: " + data.user.email;
  } else {
    document.getElementById("status").innerText = "No logueado";
  }
}

async function generate() {
  const { data } = await supabase.auth.getUser();

  if (!data.user) {
    alert("tienes que iniciar sesión primero");
    return;
  }

  alert("ya puedes usar la app 🔥");
}

checkUser();
</script>

</body>
</html>
